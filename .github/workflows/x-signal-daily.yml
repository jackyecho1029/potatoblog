name: X Signal Daily Update

on:
  schedule:
    # Beijing time 0:05 -> UTC 16:05
    - cron: '7 16 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  x-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install feedparser requests

      - name: Generate X Signal
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RSSHUB_URL: https://rsshub-production-3f0d.up.railway.app
        run: python3 scripts/fetch-x-signals.py

      - name: Commit and push
        run: |
          git config --global user.name 'Potato Signal Bot'
          git config --global user.email 'bot@potatoecho.com'
          git add posts/x-signals/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: daily x signal update"
            git pull --rebase
            git push
          fi
